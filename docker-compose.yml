services:
  server:
    build:
      context: ./server
    container_name: zoet-plus-server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - CLIENT_ORIGIN=http://localhost:5173
    volumes:
      - zoet_plus_data:/app/data

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:4000
    container_name: zoet-plus-client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  zoet_plus_data:
